    <linearGradient id="shaft" x1="0" y1="224" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16232f" stop-opacity="0"/>
      <stop offset="34%" stop-color="#22384a"/>
      <stop offset="100%" stop-color="#2f4a63"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="11"/></filter>
    <filter id="soft2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
